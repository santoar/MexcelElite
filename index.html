<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 50px; background-color: #e9ecef; }
        .card { background: white; padding: 40px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid #004aad; }
        h2 { color: #004aad; margin-bottom: 5px; }
        p { color: #555; margin-bottom: 25px; font-style: italic; }
        input { padding: 12px; margin: 10px; width: 320px; border: 1px solid #ddd; border-radius: 6px; display: block; margin-left: auto; margin-right: auto; font-size: 14px; box-sizing: border-box; }
        
        /* Download Button Style */
        .download-btn { padding: 12px 30px; background: #004aad; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; margin-top: 15px; }
        .download-btn:hover { background: #003380; }
        
        /* Feedback Button Style */
        .feedback-btn { background: #28a745; color: white; padding: 12px 30px; text-decoration: none; border-radius: 6px; font-size: 16px; font-weight: bold; display: inline-block; margin-bottom: 20px; transition: 0.3s; border: none; cursor: pointer;}
        .feedback-btn:hover { background: #218838; }
        
        canvas { display: none; }
        
        /* Form chhupane ke liye class */
        #certificateSection { display: none; } 
    </style>
</head>
<body>

    <div class="card">
        <h2>Workshop Certificate</h2>
        <p>"Performance Analysis Using Excel and Power Query"</p>
        
        <div id="feedbackSection">
            <p style="color: #d9534f; font-weight: bold;">Step 1: Please fill the feedback form to unlock your certificate.</p>
            <a href="https://forms.gle/7TWmeRqfLorx2vTs5" target="_blank" class="feedback-btn" onclick="unlockForm()">📝 Fill Feedback Form</a>
        </div>

        <div id="certificateSection">
            <hr style="border-top: 1px solid #ddd; margin: 20px 0;">
            <p style="color: #28a745; font-weight: bold;">Step 2: Enter details to download</p>
            
            <input type="text" id="name" placeholder="Enter Participant Name">
            <input type="text" id="date" placeholder="Please select date" onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'">
            
            <button class="download-btn" onclick="generateCertificate()">Download My Certificate</button>
        </div>
    </div>

    <canvas id="certificateCanvas" width="2000" height="1420"></canvas>

    <script>
        // Form Unlock karne ka function
        function unlockForm() {
            // Jaise hi link par click hoga, 1 second baad certificate section dikh jayega
            setTimeout(() => {
                document.getElementById('feedbackSection').innerHTML = '<p style="color: #28a745; font-weight: bold;">✅ Feedback Link Opened! You can now download your certificate.</p>';
                document.getElementById('certificateSection').style.display = 'block';
            }, 1000); 
        }

        // Puraana Certificate Generate karne ka function
        function generateCertificate() {
            const name = document.getElementById('name').value;
            const rawDate = document.getElementById('date').value;
            
            if(!name || !rawDate) { 
                alert("Please enter both Name and Date!"); 
                return; 
            }

            const randomNum = Math.floor(100000 + Math.random() * 900000); 
            const certNo = "MEE/FDP/283/" + randomNum;
            const safeCertNo = certNo.replace(/\//g, '-');

            const dateObj = new Date(rawDate);
            const formattedDate = dateObj.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            const canvas = document.getElementById('certificateCanvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();

            img.src = 'template.jpeg'; 
            
            img.onload = function() {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#112244'; 

                // Cert. No
                ctx.font = 'bold 28px serif';
                ctx.textAlign = 'left';
                ctx.fillText('Cert. No: ' + certNo, 80, 340); 

                // Workshop Title
                ctx.textAlign = 'center';
                ctx.font = 'italic bold 55px Georgia, serif';
                ctx.fillText('"Performance Analysis Using Excel and Power Query"', 1000, 725);

                // Name
                ctx.font = 'bold 85px serif';
                ctx.fillText(name.toUpperCase(), 1000, 580);

                // Bottom Left Date
                ctx.font = '45px serif';
                ctx.textAlign = 'left';
                ctx.fillText(formattedDate, 100, 1165); 
                
                // Center Date
                ctx.font = '32px serif'; 
                ctx.textAlign = 'center'; 
                ctx.fillText(formattedDate, 1060, 905);

                // Download Process
                const link = document.createElement('a');
                link.download = `Cert_${safeCertNo}_${name.replace(/\s+/g, '_')}.png`; 
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            };
            
            img.onerror = function() {
                alert("Error: Image not found. Please check 'template.jpeg' on GitHub.");
            };
        }
    </script>
</body>
</html>
